name: Sync OpenFileBot APT Repo

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg jq

      - name: Sync packages and generate repo metadata
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REPO: masterxq/openfilebot
          KEEP_VERSIONS: '5'
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ vars.APT_GPG_KEY_ID }}
        run: ./scripts/sync_apt_repo.sh

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
